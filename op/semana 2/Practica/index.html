<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas de los estudiantes</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="title">
        <p class="title_text">Notas de los estudiantes</p>
    </div>
    <div class="content">
        <div class="array">
            <p>Array original de las notas</p>
            <div class="original_notas" id="original-notas">
                <!-- Aquí se mostrarán las notas originales -->
            </div>
        </div>
        <div class="array">    
            <p>Array de las notas copiadas</p>
            <div class="copia_notas" id="copia-notas">
                <!-- Aquí se mostrarán las notas copiadas -->   
            </div>
        </div>
    </div>
    <div class="content_resultado">
        <div class="nota_r">
            <p class="resultado_text">Nota mínima</p>
            <div class="resultado" id="nota-minima">
                <!-- Aquí se mostrará la nota mínima -->
            </div>
        </div>
        <div class="nota_r">
            <p class="resultado_text">Nota máxima</p>
            <div class="resultado" id="nota-maxima">
                <!-- Aquí se mostrará la nota máxima -->
            </div>
        </div>
        <div class="nota_r">
            <p class="resultado_text">Nota promedio</p>
            <div class="resultado" id="nota-promedio">
                <!-- Aquí se mostrará la nota promedio -->
            </div>
        </div>
    </div>
    <div class="content_interactive">
        <div class="interactive">
            <p class="verificacion_text">Verificación de cuantos enteros hay en el array</p>
            <div class="verificacion_resultado" id="verificacion-resultados">
                <!-- Aquí se mostrarán los resultados de la verificación de enteros -->
            </div>
        </div>
        <div class="interactive">
            <button class="aleatorio_button" id="generar-numero" onclick="generarNumeroAleatorio(1,10)">
                Generar nueva nota aleatoria
            </button>
            <div class="numero_aleatoria" id="numero-aleatorio">
                <!-- Aquí se mostrará la nueva nota aleatoria -->
                 
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
